<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TXT 阅读器</title>
<style>
  :root {
    --bg: #1E1E1E;
    --fg: #D4D4D4;
    --sel: #264F78;
    --border: #444;
    --btn-bg: #2d2d2d;
    --btn-hover: #3d3d3d;
    --tab-active: #1E1E1E;
    --tab-inactive: #2a2a2a;
    --toolbar-bg: #252525;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* 工具栏 */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--toolbar-bg);
    flex-shrink: 0;
    flex-wrap: wrap;
    min-height: 38px;
  }
  .toolbar button {
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--btn-bg);
    color: var(--fg);
    cursor: pointer;
    font-size: 13px;
    white-space: nowrap;
  }
  .toolbar button:hover { background: var(--btn-hover); }
  .tb-theme.active { border-color: #4A90D9 !important; background: #1a3a5c !important; color: #D6E8FB !important; }
  .tb-sep { width: 1px; height: 20px; background: var(--border); margin: 0 3px; }
  .dot { display: inline-block; width: 10px; height: 10px; border-radius: 2px; border: 1px solid #999; vertical-align: middle; margin-right: 3px; position: relative; top: -1px; }

  /* 主区域 */
  .main-area {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* 窗格 */
  .pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 200px;
    min-height: 80px;
  }

  /* 窗格头部 */
  .pane-header {
    display: flex;
    align-items: center;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    min-height: 30px;
  }
  .pane-header .pane-close {
    font-size: 14px;
    padding: 2px 6px;
    cursor: pointer;
    color: #999;
    flex-shrink: 0;
    order: 10;
  }
  .pane-header .pane-close:hover { background: #d9534f; color: #fff; border-radius: 2px; }

  /* 标签 */
  .pane-tabs {
    display: flex;
    align-items: center;
    overflow-x: auto;
    flex: 1;
    min-width: 0;
  }
  .pane-tabs::-webkit-scrollbar { height: 2px; }
  .pane-tab {
    display: flex;
    align-items: center;
    gap: 3px;
    padding: 4px 10px;
    border-right: 1px solid var(--border);
    cursor: pointer;
    font-size: 12px;
    white-space: nowrap;
    background: var(--tab-inactive);
    color: var(--fg);
    user-select: none;
    max-width: 160px;
    flex-shrink: 0;
  }
  .pane-tab.active { background: var(--tab-active); border-bottom: 2px solid #4A90D9; }
  .pane-tab .tab-name { overflow: hidden; text-overflow: ellipsis; }
  .pane-tab.modified .tab-name::before { content: '● '; color: #4A90D9; font-size: 9px; }
  .pane-tab .tab-close { font-size: 14px; margin-left: 2px; padding: 0 3px; border-radius: 2px; color: #999; cursor: pointer; flex-shrink: 0; }
  .pane-tab .tab-close:hover { background: #d9534f; color: #fff; }

  /* 编辑区 */
  .pane-editor {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .pane-editor textarea {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    padding: 28px 44px;
    font-size: 18px;
    line-height: 1.9;
    border: none;
    outline: none;
    resize: none;
    background: var(--bg);
    color: var(--fg);
    font-family: "Microsoft YaHei", "PingFang SC", serif;
    overflow-y: auto;
    white-space: pre-wrap;
    display: none;
  }
  .pane-editor textarea.active { display: block; }
  .pane-editor textarea::selection { background: var(--sel); }

  .pane-hint {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    color: #666;
    pointer-events: auto;
    z-index: 0;
  }
  .hint-link { color: #4A90D9; cursor: pointer; text-decoration: underline; }
  .hint-link:hover { color: #6DB3F8; }

  /* 字数统计 */
  .pane-stats {
    position: absolute;
    bottom: 6px;
    right: 16px;
    font-size: 11px;
    color: #888;
    pointer-events: none;
    z-index: 1;
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 3px;
    opacity: 0.85;
  }

  /* 分割条 */
  .splitter {
    flex-shrink: 0;
    background: var(--border);
    z-index: 10;
  }
  .splitter.h { width: 5px; cursor: col-resize; }
  .splitter.v { height: 5px; cursor: row-resize; }
  .splitter:hover { background: #4A90D9; }

  /* 搜索栏 */
  .search-bar {
    display: none;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: var(--toolbar-bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .search-bar.on { display: flex; }
  .search-bar input {
    width: 180px;
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--fg);
    font-size: 13px;
    outline: none;
  }
  .search-bar input:focus { border-color: #4A90D9; }
  .search-bar .sr-count { font-size: 12px; color: #999; min-width: 50px; }
  .search-bar button {
    padding: 3px 8px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--btn-bg);
    color: var(--fg);
    cursor: pointer;
    font-size: 12px;
    white-space: nowrap;
  }
  .search-bar button:hover { background: var(--btn-hover); }
  .search-bar button.on { border-color: #4A90D9; background: #1a3a5c; color: #D6E8FB; }
  .search-bar .sr-close { margin-left: auto; font-size: 16px; cursor: pointer; color: #999; padding: 0 4px; }
  .search-bar .sr-close:hover { color: var(--fg); }

  /* 右键菜单 */
  .ctx-menu {
    position: fixed;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 3px 0;
    z-index: 9999;
    box-shadow: 0 4px 14px rgba(0,0,0,.4);
    min-width: 150px;
    font-size: 13px;
  }
  .ctx-menu div { padding: 6px 16px; cursor: pointer; color: var(--fg); }
  .ctx-menu div:hover { background: var(--btn-hover); }
</style>
</head>
<body>

<div class="toolbar" id="toolbar">
  <button id="tb-new" onclick="cmdNew()">新建</button>
  <button id="tb-save" onclick="cmdSave()">保存</button>
  <button id="tb-saveas" onclick="cmdSaveAs()">另存为</button>
  <span class="tb-sep"></span>
  <button class="tb-theme" data-theme="light"><span class="dot" style="background:#FFF;border-color:#aaa"></span><span class="t-text">白底</span></button>
  <button class="tb-theme" data-theme="warm"><span class="dot" style="background:#F5E6C8"></span><span class="t-text">暖黄</span></button>
  <button class="tb-theme" data-theme="mint"><span class="dot" style="background:#C7EDCC"></span><span class="t-text">豆沙绿</span></button>
  <button class="tb-theme active" data-theme="dark"><span class="dot" style="background:#1E1E1E"></span><span class="t-text">黑底</span></button>
  <button class="tb-theme" data-theme="amber"><span class="dot" style="background:#1A1410"></span><span class="t-text">琥珀</span></button>
  <span class="tb-sep"></span>
  <button onclick="changeFontSize(-1)">A-</button>
  <button onclick="changeFontSize(1)">A+</button>
  <span class="tb-sep"></span>
  <button id="tb-splitH" onclick="splitPane('h')">▯▯</button>
  <button id="tb-splitV" onclick="splitPane('v')">⬓⬓</button>
  <span class="tb-sep"></span>
  <button id="tb-lang" onclick="toggleLang()">EN</button>
</div>

<div class="search-bar" id="searchBar">
  <input type="text" id="searchInput" />
  <span class="sr-count" id="searchCount"></span>
  <button id="searchPrevBtn">▲</button>
  <button id="searchNextBtn">▼</button>
  <button id="searchCaseBtn">Aa</button>
  <span class="sr-close" onclick="toggleSearch(false)">&times;</span>
</div>

<div class="main-area" id="mainArea">
  <div class="pane" id="pane-0">
    <div class="pane-header">
      <div class="pane-tabs"></div>
      <span class="pane-close" onclick="removePane(0)">&times;</span>
    </div>
    <div class="pane-editor">
      <div class="pane-hint">拖 txt 文件 或 <span class="hint-link" onclick="cmdOpen()">打开</span></div>
      <div class="pane-stats"></div>
    </div>
  </div>
</div>

<div class="ctx-menu" id="ctxMenu" style="display:none"></div>

<script>
// ===================== i18n =====================
const UI = {
  zh: { newTab:'新建', save:'保存', saveAs:'另存为', light:'白底', warm:'暖黄', mint:'豆沙绿', dark:'黑底', amber:'琥珀',
    splitH:'▯▯ 左右', splitV:'⬓⬓ 上下',
    hint:'拖 txt 文件 或 <span class="hint-link" onclick="cmdOpen()">打开</span>',
    hintNew:'拖 txt 文件 或 <span class="hint-link" onclick="cmdOpen()">打开</span>',
    searchPlaceholder:'搜索…', noMatch:'无匹配',
    closeTab:n=>`关闭「${n}」`, saveMenu:'保存', saveAsMenu:'另存为…',
    moveToPane:i=>`移到窗格 ${i+1}`, moveNewPane:'移到新窗格',
    unsaved:n=>`「${n}」有未保存的修改，确定关闭？`,
    saveFail:'保存失败：', saveAsFail:'另存失败：', openFail:'打开失败：', invalidLine:'无效行号',
    goToLine:t=>`跳转到行 (1–${t})：`, untitled:'未命名.txt', panes:'窗格', chars:'字', lines:'行',
  },
  en: { newTab:'New', save:'Save', saveAs:'Save As', light:'Light', warm:'Warm', mint:'Mint', dark:'Dark', amber:'Amber',
    splitH:'▯▯ L/R', splitV:'⬓⬓ T/B',
    hint:'Drop .txt file or <span class="hint-link" onclick="cmdOpen()">Open</span>',
    hintNew:'Drop .txt file or <span class="hint-link" onclick="cmdOpen()">Open</span>',
    searchPlaceholder:'Search…', noMatch:'No match',
    closeTab:n=>`Close "${n}"`, saveMenu:'Save', saveAsMenu:'Save As…',
    moveToPane:i=>`Move to Pane ${i+1}`, moveNewPane:'Move to New Pane',
    unsaved:n=>`"${n}" has unsaved changes. Close?`,
    saveFail:'Save failed: ', saveAsFail:'Save-as failed: ', openFail:'Open failed: ', invalidLine:'Invalid line number',
    goToLine:t=>`Go to line (1–${t}):`, untitled:'untitled.txt', panes:'Panes', chars:'c', lines:'ln',
  },
};
let lang = 'zh';
function t(key, ...args) {
  let v = UI[lang][key];
  if (typeof v === 'function') v = v(...args);
  return v !== undefined ? v : key;
}
function toggleLang() {
  lang = lang === 'zh' ? 'en' : 'zh';
  try { localStorage.setItem('txt-reader-lang', lang); } catch(e) {}
  applyLang();
}
function applyLang() {
  const d = UI[lang];
  // toolbar buttons with t-text spans
  document.querySelectorAll('.t-text').forEach(el => {
    const theme = el.parentElement.dataset.theme;
    if (d[theme]) el.textContent = d[theme];
  });
  // toolbar buttons with IDs
  document.getElementById('tb-new').textContent = d.newTab;
  document.getElementById('tb-save').textContent = d.save;
  document.getElementById('tb-saveas').textContent = d.saveAs;
  document.getElementById('tb-splitH').textContent = d.splitH;
  document.getElementById('tb-splitV').textContent = d.splitV;
  document.getElementById('tb-lang').textContent = lang === 'zh' ? 'EN' : '中';
  // hints
  document.querySelectorAll('.pane-hint').forEach(el => el.innerHTML = d.hint);
  // search
  const si = document.getElementById('searchInput'); if (si) si.placeholder = d.searchPlaceholder;
}
try { const saved = localStorage.getItem('txt-reader-lang'); if (saved === 'en') lang = 'en'; } catch(e) {}

// ===================== 配色 =====================
const themes = {
  light:{bg:'#FFFFFF',fg:'#1A1A1A',sel:'#ADD6FF',border:'#ddd',btnBg:'#f0f0f0',btnHover:'#e0e0e0',tabActive:'#fff',tabInactive:'#e8e8e8',toolbarBg:'#fafafa'},
  warm:{bg:'#F5E6C8',fg:'#3D2B1F',sel:'#D4B896',border:'#c8b898',btnBg:'#EDD9B8',btnHover:'#dcc8a0',tabActive:'#F5E6C8',tabInactive:'#ddd0b0',toolbarBg:'#EDD9B8'},
  mint:{bg:'#C7EDCC',fg:'#1A3A1A',sel:'#A8D8AE',border:'#9cc8a2',btnBg:'#BDE5C2',btnHover:'#a8d8ae',tabActive:'#C7EDCC',tabInactive:'#b0d8b6',toolbarBg:'#BDE5C2'},
  dark:{bg:'#1E1E1E',fg:'#D4D4D4',sel:'#264F78',border:'#444',btnBg:'#2d2d2d',btnHover:'#3d3d3d',tabActive:'#1E1E1E',tabInactive:'#2a2a2a',toolbarBg:'#252525'},
  amber:{bg:'#1A1410',fg:'#D4A554',sel:'#3E2E1A',border:'#3a3028',btnBg:'#241E16',btnHover:'#342a1e',tabActive:'#1A1410',tabInactive:'#241C16',toolbarBg:'#1E1814'},
};
let currentTheme = 'dark';
let fontSize = 18;

function applyTheme(name) {
  currentTheme = name;
  const t = themes[name];
  const r = document.documentElement.style;
  r.setProperty('--bg',t.bg); r.setProperty('--fg',t.fg); r.setProperty('--sel',t.sel);
  r.setProperty('--border',t.border); r.setProperty('--btn-bg',t.btnBg); r.setProperty('--btn-hover',t.btnHover);
  r.setProperty('--tab-active',t.tabActive); r.setProperty('--tab-inactive',t.tabInactive); r.setProperty('--toolbar-bg',t.toolbarBg);
  document.querySelectorAll('.pane-editor textarea').forEach(ta => { ta.style.background = t.bg; ta.style.color = t.fg; ta.style.caretColor = t.fg; });
  document.querySelectorAll('.tb-theme').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`.tb-theme[data-theme="${name}"]`);
  if (btn) btn.classList.add('active');
}
document.querySelectorAll('.tb-theme').forEach(btn => { btn.addEventListener('click', () => applyTheme(btn.dataset.theme)); });

function changeFontSize(delta) {
  fontSize = Math.max(12, Math.min(36, fontSize + delta));
  document.querySelectorAll('.pane-editor textarea').forEach(ta => ta.style.fontSize = fontSize + 'px');
}

// ===================== 数据 =====================
let fileTabs = [];      // { id, name, handle, modified, textarea, paneId }
let tabIdSeq = 0;
let activeFileId = null;
let panes = [];         // { id, el, headerEl, tabsEl, editorEl, statsEl, tabs:[], activeFileId }
let paneIdSeq = 1;

const mainArea = document.getElementById('mainArea');

// ===================== 窗格 =====================
function initPane0() {
  const el = document.getElementById('pane-0');
  return {
    id: 0, el,
    headerEl: el.querySelector('.pane-header'),
    tabsEl: el.querySelector('.pane-tabs'),
    editorEl: el.querySelector('.pane-editor'),
    statsEl: el.querySelector('.pane-stats'),
    tabs: [], activeFileId: null,
  };
}

function createPane() {
  const id = paneIdSeq++;
  const el = document.createElement('div');
  el.className = 'pane'; el.id = 'pane-' + id;

  const header = document.createElement('div');
  header.className = 'pane-header';
  const tabs = document.createElement('div');
  tabs.className = 'pane-tabs';
  const closeBtn = document.createElement('span');
  closeBtn.className = 'pane-close';
  closeBtn.innerHTML = '&times;';
  closeBtn.addEventListener('click', e => { e.stopPropagation(); removePane(id); });
  header.appendChild(tabs);
  header.appendChild(closeBtn);
  el.appendChild(header);

  const editor = document.createElement('div');
  editor.className = 'pane-editor';
  const hint = document.createElement('div');
  hint.className = 'pane-hint';
  hint.innerHTML = UI[lang].hint;
  const stats = document.createElement('div');
  stats.className = 'pane-stats';
  editor.appendChild(hint);
  editor.appendChild(stats);
  el.appendChild(editor);

  mainArea.appendChild(el);

  const pane = { id, el, headerEl: header, tabsEl: tabs, editorEl: editor, statsEl: stats, tabs: [], activeFileId: null };
  panes.push(pane);

  // 拖放
  el.addEventListener('dragover', e => {
    if ([...e.dataTransfer.items].some(i => i.kind === 'file' || i.type === 'text/plain')) e.preventDefault();
  });
  el.addEventListener('drop', e => {
    e.preventDefault();
    e.stopPropagation();
    const raw = e.dataTransfer.getData('text/plain');
    if (raw && !isNaN(parseInt(raw))) { switchFileToPane(parseInt(raw), pane); }
    else { handleFileDrop(e, pane); }
  });

  refreshTabs(pane);
  return pane;
}

function splitPane(direction) {
  const af = getActiveFile();
  const pane = af ? getPaneById(af.paneId) : panes[0];
  if (!pane) return;

  mainArea.style.flexDirection = direction === 'h' ? 'row' : 'column';
  const newPane = createPane();
  const splitter = document.createElement('div');
  splitter.className = 'splitter ' + direction;

  // 全部 flex:1，均分空间
  panes.forEach(p => { p.el.style.flex = '1'; });

  // 在 active pane 右边/下边插入
  pane.el.after(splitter);
  splitter.after(newPane.el);

  const isH = direction === 'h';
  splitter.addEventListener('mousedown', e => {
    e.preventDefault();
    const onMove = ev => {
      const r = mainArea.getBoundingClientRect();
      const total = isH ? r.width : r.height;
      const pos = isH ? ev.clientX - r.left : ev.clientY - r.top;
      const pct = Math.max(10, Math.min(90, (pos / total) * 100));
      pane.el.style.flex = `0 0 ${pct}%`;
      newPane.el.style.flex = `0 0 calc(${100 - pct}% - 5px)`;
    };
    const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  refreshAll();
}

function removePane(paneId) {
  if (panes.length <= 1) return;
  const pane = getPaneById(paneId);
  if (!pane) return;
  const target = panes.find(p => p.id !== paneId);
  if (target) { [...pane.tabs].forEach(fid => switchFileToPane(fid, target)); }
  const prev = pane.el.previousElementSibling;
  const next = pane.el.nextElementSibling;
  if (prev && prev.classList.contains('splitter')) prev.remove();
  if (next && next.classList.contains('splitter')) next.remove();
  pane.el.remove();
  panes = panes.filter(p => p.id !== paneId);
  if (panes.length <= 1) { mainArea.style.flexDirection = 'row'; panes.forEach(p => p.el.style.flex = '1'); }
  refreshAll();
}

// ===================== 文件 =====================
function createFile(name, handle, paneId) {
  const id = ++tabIdSeq;
  const tab = { id, name, handle, modified: false, textarea: null, paneId };
  fileTabs.push(tab);
  return tab;
}

function addFileToPane(tab, pane) {
  pane.tabs.push(tab.id);
  tab.paneId = pane.id;
  const ta = document.createElement('textarea');
  ta.spellcheck = false;
  ta.style.fontSize = fontSize + 'px';
  ta.style.background = themes[currentTheme].bg;
  ta.style.color = themes[currentTheme].fg;
  ta.style.caretColor = themes[currentTheme].fg;
  ta.addEventListener('input', () => { tab.modified = true; updateStats(pane.id); refreshTabs(pane); });
  ta.addEventListener('focus', () => {
    if (activeFileId !== tab.id) {
      activeFileId = tab.id;
      const p = getPaneById(tab.paneId);
      if (p) p.activeFileId = tab.id;
      updateStats(pane.id);
      refreshTabs(pane);
    }
  });
  pane.editorEl.appendChild(ta);
  tab.textarea = ta;
  // 隐藏提示
  const hint = pane.editorEl.querySelector('.pane-hint');
  if (hint) hint.style.display = 'none';
  activateFile(tab.id);
}

function activateFile(fileId) {
  const tab = fileTabs.find(t => t.id === fileId);
  if (!tab) return;
  const pane = getPaneById(tab.paneId);
  if (pane) {
    pane.editorEl.querySelectorAll('textarea').forEach(ta => ta.classList.remove('active'));
    pane.activeFileId = fileId;
  }
  if (tab.textarea) { tab.textarea.classList.add('active'); tab.textarea.focus(); }
  activeFileId = fileId;
  updateStats(tab.paneId);
  refreshAll();
}

function switchFileToPane(fileId, targetPane) {
  const tab = fileTabs.find(t => t.id === fileId);
  if (!tab) return;
  const oldPane = getPaneById(tab.paneId);
  if (oldPane) {
    oldPane.tabs = oldPane.tabs.filter(id => id !== fileId);
    if (oldPane.activeFileId === fileId) oldPane.activeFileId = oldPane.tabs[0] || null;
  }
  if (!targetPane.tabs.includes(fileId)) targetPane.tabs.push(fileId);
  tab.paneId = targetPane.id;
  if (tab.textarea && tab.textarea.parentNode !== targetPane.editorEl) {
    targetPane.editorEl.appendChild(tab.textarea);
  }
  const hint = targetPane.editorEl.querySelector('.pane-hint');
  if (hint) hint.style.display = 'none';
  activateFile(fileId);
}

function closeFile(fileId) {
  const tab = fileTabs.find(t => t.id === fileId);
  if (!tab) return;
  if (tab.modified && !confirm(t('unsaved', tab.name))) return;
  const pane = getPaneById(tab.paneId);
  if (pane) {
    pane.tabs = pane.tabs.filter(id => id !== fileId);
    if (pane.activeFileId === fileId) pane.activeFileId = pane.tabs[0] || null;
  }
  if (tab.textarea) tab.textarea.remove();
  fileTabs = fileTabs.filter(t => t.id !== fileId);
  if (activeFileId === fileId) {
    if (pane && pane.activeFileId) {
      activeFileId = pane.activeFileId;
      const nt = fileTabs.find(t => t.id === activeFileId);
      if (nt && nt.textarea) nt.textarea.classList.add('active');
    } else {
      activeFileId = fileTabs[0]?.id || null;
      if (activeFileId) {
        const nt = fileTabs.find(t => t.id === activeFileId);
        if (nt && nt.textarea) { nt.textarea.classList.add('active'); const pp = getPaneById(nt.paneId); if (pp) pp.activeFileId = activeFileId; }
      }
    }
  }
  // 恢复提示
  if (pane && pane.tabs.length === 0) {
    const hint = pane.editorEl.querySelector('.pane-hint');
    if (hint) hint.style.display = 'flex';
    pane.statsEl.textContent = '';
  }
  refreshAll();
}

function getActiveFile() { return fileTabs.find(t => t.id === activeFileId) || null; }
function getPaneById(id) { return panes.find(p => p.id === id) || null; }

// ===================== 渲染 =====================
function refreshTabs(pane) {
  // 只渲染标签 DOM，不碰 × 按钮
  const el = pane.tabsEl;
  el.innerHTML = '';
  pane.tabs.forEach(fileId => {
    const tab = fileTabs.find(t => t.id === fileId);
    if (!tab) return;
    const div = document.createElement('div');
    div.className = 'pane-tab' + (fileId === pane.activeFileId ? ' active' : '') + (tab.modified ? ' modified' : '');
    div.draggable = true;
    div.innerHTML = `<span class="tab-name">${escHtml(tab.name)}</span><span class="tab-close">&times;</span>`;
    div.addEventListener('click', e => { if (!e.target.classList.contains('tab-close')) activateFile(fileId); });
    div.querySelector('.tab-close').addEventListener('click', e => { e.stopPropagation(); closeFile(fileId); });
    div.addEventListener('contextmenu', e => { e.preventDefault(); showCtxMenu(e.clientX, e.clientY, fileId); });
    div.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', String(fileId)); });
    el.appendChild(div);
  });
}

function refreshAll() {
  panes.forEach(p => refreshTabs(p));
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ===================== 字数 =====================
function updateStats(paneId) {
  const pane = getPaneById(paneId);
  if (!pane || !pane.statsEl) return;
  const tab = fileTabs.find(t => t.id === pane.activeFileId);
  if (!tab || !tab.textarea) { pane.statsEl.textContent = ''; return; }
  const text = tab.textarea.value;
  pane.statsEl.textContent = text.length + ' ' + t('chars') + ' ' + (text ? text.split('\n').length : 0) + ' ' + t('lines');
}

// ===================== 右键菜单 =====================
function showCtxMenu(x, y, fileId) {
  const menu = document.getElementById('ctxMenu');
  const tab = fileTabs.find(t => t.id === fileId);
  if (!tab) return;
  const names = panes.map((p,i) => `<div data-act="toPane" data-pane="${p.id}">${escHtml(t('moveToPane',i))}</div>`).join('');
  menu.innerHTML = `
    <div data-act="close">${escHtml(t('closeTab',tab.name))}</div>
    <div data-act="save">${t('saveMenu')}</div>
    <div data-act="saveAs">${t('saveAsMenu')}</div>
    ${names}
    <div data-act="newPane">${t('moveNewPane')}</div>
  `;
  menu.style.display = 'block';
  menu.style.left = Math.min(x, window.innerWidth - 160) + 'px';
  menu.style.top = Math.min(y, window.innerHeight - 180) + 'px';
  menu.querySelectorAll('div[data-act]').forEach(div => {
    div.onclick = () => { hideCtx(); const a = div.dataset.act;
      if (a==='close') closeFile(fileId);
      if (a==='save') saveTab(tab);
      if (a==='saveAs') cmdSaveAs();
      if (a==='toPane') { const p = getPaneById(parseInt(div.dataset.pane)); if (p) switchFileToPane(fileId, p); }
      if (a==='newPane') switchFileToPane(fileId, createPane());
    };
  });
  setTimeout(() => document.addEventListener('click', hideCtx, { once: true }), 0);
}
function hideCtx() { document.getElementById('ctxMenu').style.display = 'none'; }

// ===================== I/O =====================
async function cmdOpen() {
  try {
    const handles = await window.showOpenFilePicker({
      types: [{ description: '文本', accept: { 'text/plain': ['.txt', '.text'] } }],
      multiple: true, startIn: 'desktop',
    });
    if (handles.length === 0) return;

    mainArea.style.flexDirection = 'row';

    for (let i = 0; i < handles.length; i++) {
      let pane;
      if (i === 0) {
        pane = activeFileId ? getPaneById(getActiveFile()?.paneId) : panes[0];
        // 如果当前 pane 已有文件，开新 pane
        if (pane && pane.tabs.length > 0) {
          pane = createPane();
        }
      } else {
        // 后续文件：自动左右拆分新窗格
        splitPane('h');
        pane = panes[panes.length - 1];
      }
      const file = await handles[i].getFile();
      const text = await file.text();
      const tab = createFile(file.name, handles[i], pane.id);
      addFileToPane(tab, pane);
      tab.textarea.value = text;
      tab.modified = false;
      updateStats(pane.id);
    }
    refreshAll();
  } catch(e) { if (e.name !== 'AbortError') alert(t('openFail') + e.message); }
}

function cmdNew() {
  let pane = activeFileId ? getPaneById(getActiveFile()?.paneId) : null;
  if (!pane) pane = panes[0];
  const tab = createFile(t('untitled'), null, pane.id);
  addFileToPane(tab, pane);
  refreshAll();
}

async function saveTab(tab) {
  if (!tab || !tab.textarea) return;
  const text = tab.textarea.value;
  const data = new TextEncoder().encode(text);
  try {
    if (tab.handle) {
      const w = await tab.handle.createWritable(); await w.write(data); await w.close();
    } else {
      const h = await window.showSaveFilePicker({ suggestedName: tab.name, types: [{ description: '文本', accept: { 'text/plain': ['.txt'] } }] });
      const w = await h.createWritable(); await w.write(data); await w.close();
      tab.handle = h; tab.name = h.name || tab.name;
    }
    tab.modified = false; refreshAll();
  } catch(e) { if (e.name !== 'AbortError') alert(t('saveFail') + e.message); }
}
function cmdSave() { const tab = getActiveFile(); if (tab) saveTab(tab); }

async function cmdSaveAs() {
  const tab = getActiveFile();
  if (!tab || !tab.textarea) return;
  const data = new TextEncoder().encode(tab.textarea.value);
  try {
    const h = await window.showSaveFilePicker({ suggestedName: tab.name, types: [{ description: '文本', accept: { 'text/plain': ['.txt'] } }] });
    const w = await h.createWritable(); await w.write(data); await w.close();
    tab.handle = h; tab.name = h.name || tab.name; tab.modified = false; refreshAll();
  } catch(e) { if (e.name !== 'AbortError') alert(t('saveAsFail') + e.message); }
}

// ===================== 拖放 =====================
function handleFileDrop(e, pane) {
  const items = [...(e.dataTransfer.items||[])].filter(i => i.kind === 'file');
  if (items.length === 0) return;
  mainArea.style.flexDirection = 'row';
  items.forEach(async (item, idx) => {
    const file = item.getAsFile();
    if (!file) return;
    const text = await file.text();
    let targetPane = pane;
    if (idx === 0) {
      if (pane.tabs.length > 0) targetPane = createPane();
    } else {
      splitPane('h');
      targetPane = panes[panes.length - 1];
    }
    const tab = createFile(file.name, null, targetPane.id);
    addFileToPane(tab, targetPane);
    tab.textarea.value = text;
    updateStats(targetPane.id);
  });
  refreshAll();
}
document.addEventListener('dragover', e => { if ([...e.dataTransfer.items].some(i => i.kind === 'file')) e.preventDefault(); });
document.addEventListener('drop', e => {
  const items = [...(e.dataTransfer.items||[])].filter(i => i.kind === 'file');
  if (items.length === 0) return;
  e.preventDefault();
  let pane = activeFileId ? getPaneById(getActiveFile()?.paneId) : null;
  if (!pane) pane = panes[0];
  handleFileDrop(e, pane);
});

// ===================== 搜索 =====================
let sr = { query:'', caseSensitive:false, matches:[], idx:-1 };
function toggleSearch(show) {
  const bar = document.getElementById('searchBar');
  if (show) { bar.classList.add('on'); document.getElementById('searchInput').focus(); document.getElementById('searchInput').select(); }
  else { bar.classList.remove('on'); }
  if (show && document.getElementById('searchInput').value) doSearch();
}
function doSearch() {
  const ta = document.querySelector('.pane-editor textarea.active');
  const q = document.getElementById('searchInput').value;
  const caseBtn = document.getElementById('searchCaseBtn');
  sr.query = q; sr.matches = []; sr.idx = -1;
  if (!ta || !q) { document.getElementById('searchCount').textContent = ''; return; }
  const flags = sr.caseSensitive ? 'g' : 'gi';
  const re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), flags);
  let m; while ((m = re.exec(ta.value)) !== null) sr.matches.push(m.index);
  document.getElementById('searchCount').textContent = sr.matches.length ? `0 / ${sr.matches.length}` : t('noMatch');
  if (sr.matches.length > 0) { sr.idx = 0; selectMatch(ta, 0); }
}
function selectMatch(ta, idx) {
  const pos = sr.matches[idx]; const len = sr.query.length;
  ta.focus(); ta.setSelectionRange(pos, pos + len);
  const before = ta.value.substring(0, pos);
  const ln = before.split('\n').length;
  ta.scrollTop = Math.max(0, ln * fontSize * 1.9 - ta.clientHeight / 2 + 28);
  document.getElementById('searchCount').textContent = `${idx+1} / ${sr.matches.length}`;
}
function srNext() {
  const ta = document.querySelector('.pane-editor textarea.active');
  if (!ta || sr.matches.length===0) return;
  sr.idx = (sr.idx + 1) % sr.matches.length; selectMatch(ta, sr.idx);
}
function srPrev() {
  const ta = document.querySelector('.pane-editor textarea.active');
  if (!ta || sr.matches.length===0) return;
  sr.idx = (sr.idx - 1 + sr.matches.length) % sr.matches.length; selectMatch(ta, sr.idx);
}
document.getElementById('searchInput').addEventListener('input', doSearch);
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); e.shiftKey ? srPrev() : srNext(); }
  if (e.key === 'Escape') { e.preventDefault(); toggleSearch(false); }
});
document.getElementById('searchNextBtn').addEventListener('click', srNext);
document.getElementById('searchPrevBtn').addEventListener('click', srPrev);
document.getElementById('searchCaseBtn').addEventListener('click', function(){ sr.caseSensitive = !sr.caseSensitive; this.classList.toggle('on', sr.caseSensitive); if (sr.query) doSearch(); });

// ===================== 跳转 =====================
function cmdGoToLine() {
  const ta = document.querySelector('.pane-editor textarea.active');
  if (!ta) return;
  const total = ta.value.split('\n').length;
  const r = prompt(t('goToLine', total));
  if (r === null) return;
  const n = parseInt(r, 10);
  if (isNaN(n) || n<1 || n>total) { alert(t('invalidLine')); return; }
  const lines = ta.value.split('\n');
  let pos = 0; for (let i=0; i<n-1; i++) pos += lines[i].length + 1;
  ta.focus(); ta.setSelectionRange(pos, pos);
  ta.scrollTop = Math.max(0, n * fontSize * 1.9 - ta.clientHeight / 2);
}

// ===================== 快捷键 =====================
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('searchBar').classList.contains('on')) { e.preventDefault(); toggleSearch(false); return; }
  if ((e.ctrlKey||e.metaKey) && e.shiftKey && e.key==='S') { e.preventDefault(); cmdSaveAs(); return; }
  if ((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); cmdSave(); return; }
  if ((e.ctrlKey||e.metaKey) && e.key==='o') { e.preventDefault(); cmdOpen(); return; }
  if ((e.ctrlKey||e.metaKey) && e.key==='t') { e.preventDefault(); cmdNew(); return; }
  if ((e.ctrlKey||e.metaKey) && e.key==='w') { e.preventDefault(); const tab=getActiveFile(); if(tab) closeFile(tab.id); return; }
  if ((e.ctrlKey||e.metaKey) && e.key==='f') { e.preventDefault(); toggleSearch(true); return; }
  if ((e.ctrlKey||e.metaKey) && e.key==='g') { e.preventDefault(); cmdGoToLine(); return; }
});

window.addEventListener('beforeunload', e => { if (fileTabs.some(t=>t.modified)) { e.preventDefault(); e.returnValue=''; } });

// ===================== 初始化 =====================
const pane0obj = initPane0();
panes.push(pane0obj);
// pane-0 拖放
const p0el = document.getElementById('pane-0');
p0el.addEventListener('dragover', e => { if ([...e.dataTransfer.items].some(i => i.kind==='file'||i.type==='text/plain')) e.preventDefault(); });
p0el.addEventListener('drop', e => {
  e.preventDefault();
  e.stopPropagation();
  const raw = e.dataTransfer.getData('text/plain');
  if (raw && !isNaN(parseInt(raw))) { switchFileToPane(parseInt(raw), panes[0]); }
  else { handleFileDrop(e, panes[0]); }
});

applyTheme('dark');
applyLang();
refreshAll();
</script>
